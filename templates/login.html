<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Login - Timeline App</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: Arial, sans-serif; background: #f0f2f5;
            display:flex; justify-content:center; align-items:center; height:100vh;
        }
        .box {
            background:#fff; padding:38px 40px; border-radius:12px;
            box-shadow:0 3px 14px rgba(0,0,0,.12); width:320px;
        }
        .box h2 { color:#0000cc; text-align:center; margin-bottom:24px; font-size:22px; }
        label { display:block; font-size:12px; color:#555; margin-bottom:5px; }
        input[type=text], input[type=password] {
            width:100%; padding:9px 12px; border:1px solid #ddd;
            border-radius:7px; font-size:14px; outline:none; margin-bottom:14px;
        }
        input:focus { border-color:#0000cc; }
        button {
            width:100%; padding:10px; background:#0000cc; color:#fff;
            border:none; border-radius:7px; font-size:15px; cursor:pointer;
        }
        button:hover { background:#0000aa; }
        .error { color:red; font-size:13px; text-align:center; margin-bottom:12px; }
    </style>
</head>
<body>
<div class="box">
    <h2>TimelineApp</h2>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST">
        <label>Username</label>
        <input type="text" name="username" placeholder="Username" required>
        <label>Password</label>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>
</body>
</html>
